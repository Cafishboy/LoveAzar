<!DOCTYPE html>

<body>

     <h5>• Berapa suka anda dengan si A(zar)?</h5>

 </div>

    function pilihin(){
      document.getElementById("a").innerHTML="LOH... inisial aja loh, tapi thanks";

      document.getElementById("c").innerHTML="ehh ada error. Dimohon untuk memilih ulang";

      document.getElementById("d").innerHTML="kamu suka banget ya sama aku?";
    }
    function pilihjelas(){
      document.getElementById("e").innerHTML="uhhh jadi sayang banget emmmmmuahhhh";
    }
let state = 1;
function pilihno() {
  const btn = document.getElementById('worzo');
  if (state === 1) {
    btn.innerHTML = 'YA!!!!!!!';
    btn.style.backgroundColor = 'lime';
    state = 2;
    btn.classlist.remove("worzo")
    btn.classlist.add("wojak")
  } else {
    btn.innerHTML = 'YA!!!!!!!';
    btn.style.backgroundColor = 'lime';
    state = 1;
    document.getElementById("e").innerHTML="uhhh jadi sayang banget emmmmmuahhhh"
  }
}
  </script>
